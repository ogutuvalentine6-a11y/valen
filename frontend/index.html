<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VaultApp – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --card: #161921;
      --border: #252932;
      --gold: #c9a84c;
      --gold-light: #e2c97e;
      --text: #e8e6e0;
      --muted: #6b7280;
      --danger: #e05c5c;
      --success: #4caf80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(201,168,76,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      position: relative;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--gold);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 36px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--gold); }

    button {
      width: 100%;
      background: var(--gold);
      color: #0d0f14;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    button:hover  { background: var(--gold-light); }
    button:active { transform: scale(0.98); }

    .msg {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
      color: var(--danger);
    }

    .msg.ok { color: var(--success); }

    .loading { opacity: 0.6; pointer-events: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">VaultApp</div>
    <div class="subtitle">Sign in to your account</div>

    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="username"/>

    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>

    <button id="loginBtn" onclick="login()">Sign In</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    // ─── point this to your Vercel backend URL ───
    const API = "https://your-app.vercel.app";

    async function login() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn      = document.getElementById("loginBtn");
      const msg      = document.getElementById("msg");

      msg.textContent = "";
      msg.className   = "msg";

      if (!email || !password) {
        msg.textContent = "Please fill in both fields.";
        return;
      }

      btn.textContent = "Signing in…";
      btn.classList.add("loading");

      try {
        const res  = await fetch(`${API}/api/auth/login`, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          msg.textContent = data.error || "Login failed.";
          return;
        }

        // Save the token so other pages can use it for API calls
        localStorage.setItem("token", data.token);
        localStorage.setItem("role",  data.role);

        // Redirect based on role that came back from the server
        if (data.role === "admin") {
          window.location.href = "admin.html";
        } else {
          window.location.href = "user.html";
        }

      } catch (err) {
        msg.textContent = "Cannot reach server. Check your connection.";
      } finally {
        btn.textContent = "Sign In";
        btn.classList.remove("loading");
      }
    }

    // Allow pressing Enter to submit
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
