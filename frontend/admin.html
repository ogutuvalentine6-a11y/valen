<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VaultApp – Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --card: #161921;
      --border: #252932;
      --gold: #c9a84c;
      --gold-light: #e2c97e;
      --text: #e8e6e0;
      --muted: #6b7280;
      --danger: #e05c5c;
      --success: #4caf80;
      --admin-accent: #7c6af7;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
    }

    body::before {
      content: '';
      position: fixed;
      bottom: -10%;
      left: -10%;
      width: 40%;
      height: 40%;
      background: radial-gradient(ellipse, rgba(124,106,247,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    header {
      max-width: 860px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--gold); }

    .admin-badge {
      background: rgba(124,106,247,0.15);
      color: var(--admin-accent);
      border: 1px solid rgba(124,106,247,0.3);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s, border-color 0.2s;
    }

    .logout:hover { color: var(--danger); border-color: var(--danger); }

    /* Add user card */
    .add-card {
      max-width: 860px;
      margin: 0 auto 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 28px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .add-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    @media (max-width: 600px) { .add-row { grid-template-columns: 1fr; } }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--gold); }

    button.action {
      background: var(--gold);
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      padding: 11px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    button.action:hover { background: var(--gold-light); }

    .msg {
      margin-top: 10px;
      font-size: 13px;
      min-height: 18px;
      color: var(--danger);
    }

    .msg.ok { color: var(--success); }

    /* Users table */
    .table-card {
      max-width: 860px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: fadeUp 0.4s ease 0.1s both;
    }

    .table-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 12px 24px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }

    td {
      padding: 14px 24px;
      font-size: 14px;
      border-bottom: 1px solid rgba(37,41,50,0.6);
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .balance-cell { color: var(--gold); font-weight: 500; }

    /* Deposit input inside table */
    .deposit-input {
      width: 90px;
      padding: 7px 10px;
      font-size: 13px;
      margin-bottom: 0;
    }

    button.small {
      background: var(--gold);
      color: #0d0f14;
      border: none;
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }

    button.small:hover { background: var(--gold-light); }

    button.del {
      background: transparent;
      border: 1px solid rgba(224,92,92,0.4);
      color: var(--danger);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      margin-left: 6px;
      transition: background 0.2s;
    }

    button.del:hover { background: rgba(224,92,92,0.1); }

    .empty { padding: 32px; text-align: center; color: var(--muted); }
  </style>
</head>
<body>

  <header>
    <div class="logo">VaultApp</div>
    <span class="admin-badge">Admin Panel</span>
    <button class="logout" onclick="logout()">Logout</button>
  </header>

  <!-- Add User -->
  <div class="add-card">
    <div class="section-title">Add New User</div>
    <div class="add-row">
      <div>
        <label>Email</label>
        <input type="email" id="newEmail" placeholder="user@email.com"/>
      </div>
      <div>
        <label>Password</label>
        <input type="password" id="newPassword" placeholder="Min 6 characters"/>
      </div>
      <div>
        <label>Starting Balance (KES)</label>
        <input type="number" id="newBalance" placeholder="0" min="0"/>
      </div>
      <div>
        <button class="action" onclick="addUser()">Add User</button>
      </div>
    </div>
    <div class="msg" id="addMsg"></div>
  </div>

  <!-- Users Table -->
  <div class="table-card">
    <div class="table-header">
      <div class="section-title" style="margin:0">All Users</div>
      <button class="action" style="padding:8px 16px; font-size:13px" onclick="loadUsers()">↻ Refresh</button>
    </div>
    <div id="tableBody">
      <div class="empty">Loading users…</div>
    </div>
  </div>

  <script>
    const API   = "https://your-app.vercel.app";
    const token = localStorage.getItem("token");
    const role  = localStorage.getItem("role");

    // Only admins allowed here
    if (!token || role !== "admin") {
      window.location.href = "index.html";
    }

    function authHeaders() {
      return { "Content-Type": "application/json", "Authorization": `Bearer ${token}` };
    }

    function showMsg(id, text, ok = false) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className   = ok ? "msg ok" : "msg";
    }

    // ─── Load all users ───
    async function loadUsers() {
      document.getElementById("tableBody").innerHTML = `<div class="empty">Loading…</div>`;
      try {
        const res   = await fetch(`${API}/api/admin/users`, { headers: authHeaders() });
        const users = await res.json();

        if (!users.length) {
          document.getElementById("tableBody").innerHTML = `<div class="empty">No users found.</div>`;
          return;
        }

        // Build table rows
        let rows = `
          <table>
            <thead>
              <tr>
                <th>Email</th>
                <th>Balance (KES)</th>
                <th>Add Deposit</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
        `;

        users.forEach(u => {
          rows += `
            <tr id="row-${u._id}">
              <td>${u.email}</td>
              <td class="balance-cell" id="bal-${u._id}">${u.balance.toLocaleString()}</td>
              <td>
                <input class="deposit-input" type="number" id="dep-${u._id}" placeholder="Amount" min="1"/>
              </td>
              <td>
                <button class="small" onclick="adminDeposit('${u._id}')">Deposit</button>
                <button class="del"   onclick="deleteUser('${u._id}')">Delete</button>
              </td>
            </tr>
          `;
        });

        rows += `</tbody></table>`;
        document.getElementById("tableBody").innerHTML = rows;

      } catch {
        document.getElementById("tableBody").innerHTML = `<div class="empty">Error loading users.</div>`;
      }
    }

    // ─── Add a user ───
    async function addUser() {
      const email   = document.getElementById("newEmail").value.trim();
      const password = document.getElementById("newPassword").value;
      const balance = Number(document.getElementById("newBalance").value) || 0;
      showMsg("addMsg", "");

      if (!email || password.length < 6) {
        showMsg("addMsg", "Enter a valid email and a password of at least 6 characters.");
        return;
      }

      const res  = await fetch(`${API}/api/admin/add-user`, {
        method:  "POST",
        headers: authHeaders(),
        body:    JSON.stringify({ email, password, balance }),
      });
      const data = await res.json();

      if (res.ok) {
        showMsg("addMsg", `User ${email} created!`, true);
        document.getElementById("newEmail").value    = "";
        document.getElementById("newPassword").value = "";
        document.getElementById("newBalance").value  = "";
        loadUsers(); // refresh the table
      } else {
        showMsg("addMsg", data.error || "Failed to create user.");
      }
    }

    // ─── Admin deposit into a user's account ───
    async function adminDeposit(userId) {
      const amount = Number(document.getElementById(`dep-${userId}`).value);
      if (!amount || amount < 1) { alert("Enter an amount to deposit."); return; }

      const res  = await fetch(`${API}/api/admin/deposit`, {
        method:  "POST",
        headers: authHeaders(),
        body:    JSON.stringify({ userId, amount }),
      });
      const data = await res.json();

      if (res.ok) {
        // Update balance in table without full reload
        document.getElementById(`bal-${userId}`).textContent = data.newBalance.toLocaleString();
        document.getElementById(`dep-${userId}`).value = "";
      } else {
        alert(data.error || "Deposit failed.");
      }
    }

    // ─── Delete a user ───
    async function deleteUser(userId) {
      if (!confirm("Delete this user permanently?")) return;

      const res  = await fetch(`${API}/api/admin/delete-user/${userId}`, {
        method:  "DELETE",
        headers: authHeaders(),
      });
      const data = await res.json();

      if (res.ok) {
        // Remove row from DOM
        document.getElementById(`row-${userId}`).remove();
      } else {
        alert(data.error || "Delete failed.");
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = "index.html";
    }

    loadUsers();
  </script>
</body>
</html>
