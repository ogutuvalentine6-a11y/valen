<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VaultApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #070a0f;
      --surface:    #0e1219;
      --card:       #131720;
      --border:     #1e2535;
      --border-hi:  #2e3a50;
      --gold:       #d4a843;
      --gold-dim:   #9a7830;
      --gold-glow:  rgba(212,168,67,0.18);
      --text:       #dde3ed;
      --muted:      #5a6580;
      --soft:       #8a96aa;
      --danger:     #e05c5c;
      --success:    #3dba7c;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background orbs */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .bg-orb-1 {
      width: 500px; height: 500px;
      top: -150px; left: -150px;
      background: radial-gradient(circle, rgba(212,168,67,0.07) 0%, transparent 70%);
    }
    .bg-orb-2 {
      width: 400px; height: 400px;
      bottom: -100px; right: -100px;
      background: radial-gradient(circle, rgba(61,186,124,0.05) 0%, transparent 70%);
      animation-delay: -6s;
    }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,20px) scale(1.05); }
    }

    /* Subtle grid overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 0 16px;
    }

    /* Logo */
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
      animation: slideDown 0.5s ease both;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--text); font-weight: 400; }
    .tagline { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
      animation: riseUp 0.5s ease 0.1s both;
    }
    @keyframes riseUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Tabs */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 18px;
      text-align: center;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.4px;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
      user-select: none;
      position: relative;
    }
    .tab::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 20%; right: 20%;
      height: 2px;
      background: var(--gold);
      border-radius: 2px 2px 0 0;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .tab.active { color: var(--gold); background: rgba(212,168,67,0.04); }
    .tab.active::after { opacity: 1; }
    .tab:hover:not(.active) { color: var(--soft); }

    /* Panels */
    .panels { padding: 32px 36px 28px; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* Fields */
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 7px;
    }
    .field input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }
    .field input::placeholder { color: var(--muted); }

    /* Password show/hide */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .pw-toggle {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 16px;
      padding: 4px;
      transition: color 0.2s;
      line-height: 1;
    }
    .pw-toggle:hover { color: var(--soft); }

    /* Primary button */
    .btn {
      width: 100%;
      background: var(--gold);
      color: #070a0f;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      margin-top: 4px;
    }
    .btn:hover { background: #e8bc55; box-shadow: 0 4px 20px rgba(212,168,67,0.3); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* Messages */
    .msg-area { margin-top: 14px; min-height: 20px; text-align: center; }
    .msg { font-size: 13px; color: var(--danger); display: none; }
    .msg.visible { display: block; }
    .msg.ok { color: var(--success); }

    /* Switch hint */
    .switch-hint {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 20px;
      padding-bottom: 4px;
    }
    .switch-hint a {
      color: var(--gold); text-decoration: none;
      font-weight: 500; cursor: pointer;
    }
    .switch-hint a:hover { text-decoration: underline; }

    /* Password strength */
    .strength-bar { display: flex; gap: 4px; margin-top: 6px; }
    .strength-bar span {
      flex: 1; height: 3px; border-radius: 3px;
      background: var(--border);
      transition: background 0.3s;
    }
    .strength-bar span.weak   { background: var(--danger); }
    .strength-bar span.medium { background: #e09a3d; }
    .strength-bar span.strong { background: var(--success); }
    .strength-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div class="wrapper">
    <div class="logo-area">
      <div class="logo">Vault<span>App</span></div>
      <div class="tagline">Secure. Simple. Yours.</div>
    </div>

    <div class="card">
      <div class="tabs">
        <div class="tab active" id="tab-login"    onclick="switchTab('login')">Sign In</div>
        <div class="tab"        id="tab-register" onclick="switchTab('register')">Create Account</div>
      </div>

      <div class="panels">

        <!-- LOGIN -->
        <div class="panel active" id="panel-login">
          <div class="field">
            <label>Email Address</label>
            <input type="email" id="login-email" placeholder="you@example.com" autocomplete="username"/>
          </div>
          <div class="field">
            <label>Password</label>
            <div class="pw-wrap">
              <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
              <button class="pw-toggle" onclick="togglePw('login-password', this)" tabindex="-1">👁</button>
            </div>
          </div>
          <button class="btn" id="login-btn" onclick="login()">Sign In</button>
          <div class="msg-area">
            <div class="msg" id="login-msg"></div>
          </div>
          <div class="switch-hint">
            No account? <a onclick="switchTab('register')">Create one free</a>
          </div>
        </div>

        <!-- REGISTER -->
        <div class="panel" id="panel-register">
          <div class="field">
            <label>Email Address</label>
            <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email"/>
          </div>
          <div class="field">
            <label>Password</label>
            <div class="pw-wrap">
              <input type="password" id="reg-password" placeholder="Min 6 characters"
                     autocomplete="new-password" oninput="checkStrength(this.value)"/>
              <button class="pw-toggle" onclick="togglePw('reg-password', this)" tabindex="-1">👁</button>
            </div>
            <div class="strength-bar">
              <span id="s1"></span><span id="s2"></span><span id="s3"></span>
            </div>
            <div class="strength-label" id="strength-label"></div>
          </div>
          <div class="field">
            <label>Confirm Password</label>
            <div class="pw-wrap">
              <input type="password" id="reg-confirm" placeholder="Re-enter password" autocomplete="new-password"/>
              <button class="pw-toggle" onclick="togglePw('reg-confirm', this)" tabindex="-1">👁</button>
            </div>
          </div>
          <button class="btn" id="reg-btn" onclick="register()">Create Account</button>
          <div class="msg-area">
            <div class="msg" id="reg-msg"></div>
          </div>
          <div class="switch-hint">
            Already have an account? <a onclick="switchTab('login')">Sign in</a>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    // ── Point to your Vercel backend ──
    const API = "";

    function switchTab(tab) {
      ["login","register"].forEach(t => {
        document.getElementById("panel-" + t).classList.toggle("active", t === tab);
        document.getElementById("tab-"   + t).classList.toggle("active", t === tab);
      });
      clearMsgs();
    }

    function clearMsgs() {
      ["login-msg","reg-msg"].forEach(id => {
        const el = document.getElementById(id);
        el.textContent = "";
        el.className   = "msg";
      });
    }

    function showMsg(id, text, ok = false) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className   = "msg visible" + (ok ? " ok" : "");
    }

    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      const isHidden = input.type === "password";
      input.type      = isHidden ? "text" : "password";
      btn.textContent = isHidden ? "🙈" : "👁";
    }

    function checkStrength(val) {
      const bars  = [document.getElementById("s1"), document.getElementById("s2"), document.getElementById("s3")];
      const label = document.getElementById("strength-label");
      bars.forEach(b => b.className = "");
      if (!val) { label.textContent = ""; return; }

      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[^a-zA-Z0-9]/.test(val) || /[0-9]/.test(val)) score++;

      const classes = ["weak","medium","strong"];
      const labels  = ["Weak","Fair","Strong"];
      for (let i = 0; i < score; i++) bars[i].className = classes[score - 1];
      label.textContent = labels[score - 1] || "";
    }

    async function login() {
      const email    = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      const btn      = document.getElementById("login-btn");
      showMsg("login-msg", "");

      if (!email || !password) { showMsg("login-msg", "Fill in both fields."); return; }

      btn.disabled = true; btn.textContent = "Signing in…";

      try {
        const res  = await fetch(`${API}/api/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) { showMsg("login-msg", data.error || "Login failed."); return; }

        localStorage.setItem("token", data.token);
        localStorage.setItem("role",  data.role);
        showMsg("login-msg", "Welcome back! Redirecting…", true);

        setTimeout(() => {
          window.location.href = data.role === "admin" ? "admin.html" : "user.html";
        }, 700);
      } catch {
        showMsg("login-msg", "Cannot reach server. Try again.");
      } finally {
        btn.disabled = false; btn.textContent = "Sign In";
      }
    }

    async function register() {
      const email    = document.getElementById("reg-email").value.trim();
      const password = document.getElementById("reg-password").value;
      const confirm  = document.getElementById("reg-confirm").value;
      const btn      = document.getElementById("reg-btn");
      showMsg("reg-msg", "");

      if (!email || !password)   { showMsg("reg-msg", "Fill in all fields."); return; }
      if (password.length < 6)   { showMsg("reg-msg", "Password must be at least 6 characters."); return; }
      if (password !== confirm)  { showMsg("reg-msg", "Passwords do not match."); return; }

      btn.disabled = true; btn.textContent = "Creating account…";

      try {
        const res  = await fetch(`${API}/api/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) { showMsg("reg-msg", data.error || "Registration failed."); return; }

        showMsg("reg-msg", "Account created! Signing you in…", true);
        setTimeout(() => {
          localStorage.setItem("token", data.token);
          localStorage.setItem("role",  data.role);
          window.location.href = "user.html";
        }, 900);
      } catch {
        showMsg("reg-msg", "Cannot reach server. Try again.");
      } finally {
        btn.disabled = false; btn.textContent = "Create Account";
      }
    }

    // Enter key support
    document.addEventListener("keydown", e => {
      if (e.key !== "Enter") return;
      const onLogin = document.getElementById("panel-login").classList.contains("active");
      if (onLogin) login(); else register();
    });
  </script>
</body>
</html>
