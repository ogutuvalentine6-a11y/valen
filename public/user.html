<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VaultApp – My Account</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --card: #161921;
      --border: #252932;
      --gold: #c9a84c;
      --gold-light: #e2c97e;
      --text: #e8e6e0;
      --muted: #6b7280;
      --danger: #e05c5c;
      --success: #4caf80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
    }

    body::before {
      content: '';
      position: fixed;
      top: -20%;
      right: -20%;
      width: 50%;
      height: 50%;
      background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    header {
      max-width: 700px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--gold);
    }

    .user-info { font-size: 14px; color: var(--muted); }

    .logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s, border-color 0.2s;
    }

    .logout:hover { color: var(--danger); border-color: var(--danger); }

    /* Balance card */
    .balance-card {
      max-width: 700px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #1e2130 0%, #191c27 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px 36px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .balance-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .balance-amount { font-family: 'DM Serif Display', serif; font-size: 48px; color: var(--gold); }
    .balance-currency { font-size: 18px; color: var(--muted); margin-left: 4px; }

    /* Section grid */
    .grid {
      max-width: 700px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 520px) { .grid { grid-template-columns: 1fr; } }

    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      animation: fadeUp 0.4s ease both;
    }

    .section:nth-child(2) { animation-delay: 0.05s; }
    .section:nth-child(3) { animation-delay: 0.10s; grid-column: span 2; }

    @media (max-width: 520px) {
      .section:nth-child(3) { grid-column: span 1; }
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      margin-bottom: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--gold); }

    button.action {
      width: 100%;
      background: var(--gold);
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.action:hover { background: var(--gold-light); }

    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    button.secondary:hover { border-color: var(--gold); color: var(--gold); background: transparent; }

    .msg {
      margin-top: 10px;
      font-size: 13px;
      min-height: 18px;
      color: var(--danger);
    }

    .msg.ok { color: var(--success); }

    /* Settings row */
    .settings-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 520px) { .settings-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <header>
    <div class="logo">VaultApp</div>
    <span class="user-info" id="userEmail"></span>
    <button class="logout" onclick="logout()">Logout</button>
  </header>

  <!-- Balance -->
  <div class="balance-card">
    <div class="balance-label">Available Balance</div>
    <div>
      <span class="balance-amount" id="balanceAmount">—</span>
      <span class="balance-currency">KES</span>
    </div>
  </div>

  <div class="grid">

    <!-- Deposit -->
    <div class="section">
      <div class="section-title">Deposit</div>
      <label>Amount (KES)</label>
      <input type="number" id="depositAmount" placeholder="e.g. 500" min="1"/>
      <button class="action" onclick="deposit()">Deposit</button>
      <div class="msg" id="depositMsg"></div>
    </div>

    <!-- Withdraw -->
    <div class="section">
      <div class="section-title">Withdraw</div>
      <label>Amount (KES)</label>
      <input type="number" id="withdrawAmount" placeholder="e.g. 200" min="1"/>
      <button class="action" onclick="withdraw()">Withdraw</button>
      <div class="msg" id="withdrawMsg"></div>
    </div>

    <!-- Settings -->
    <div class="section">
      <div class="section-title">Account Settings</div>
      <div class="settings-row">
        <div>
          <label>New Email</label>
          <input type="email" id="newEmail" placeholder="new@email.com"/>
          <button class="action secondary" onclick="changeEmail()">Update Email</button>
          <div class="msg" id="emailMsg"></div>
        </div>
        <div>
          <label>New Password</label>
          <input type="password" id="newPassword" placeholder="Min 6 characters"/>
          <button class="action secondary" onclick="changePassword()">Update Password</button>
          <div class="msg" id="passwordMsg"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const API   = "https://your-app.vercel.app";
    const token = localStorage.getItem("token");
    const role  = localStorage.getItem("role");

    // If not logged in, or logged in as admin, send back to login
    if (!token || role === "admin") {
      window.location.href = "index.html";
    }

    // Helpers to show/clear messages
    function showMsg(id, text, ok = false) {
      const el = document.getElementById(id);
      el.textContent  = text;
      el.className    = ok ? "msg ok" : "msg";
    }

    function authHeaders() {
      return { "Content-Type": "application/json", "Authorization": `Bearer ${token}` };
    }

    // ─── Load profile & balance ───
    async function loadProfile() {
      try {
        const res  = await fetch(`${API}/api/user/profile`, { headers: authHeaders() });
        const data = await res.json();
        if (!res.ok) { logout(); return; }
        document.getElementById("userEmail").textContent       = data.email;
        document.getElementById("balanceAmount").textContent   = data.balance.toLocaleString();
      } catch {
        document.getElementById("balanceAmount").textContent = "Error";
      }
    }

    // ─── Deposit ───
    async function deposit() {
      const amount = Number(document.getElementById("depositAmount").value);
      showMsg("depositMsg", "");
      if (!amount || amount < 1) { showMsg("depositMsg", "Enter a valid amount."); return; }

      const res  = await fetch(`${API}/api/user/deposit`, {
        method:  "POST",
        headers: authHeaders(),
        body:    JSON.stringify({ amount }),
      });
      const data = await res.json();
      if (res.ok) {
        showMsg("depositMsg", `+KES ${amount} added!`, true);
        document.getElementById("balanceAmount").textContent = data.newBalance.toLocaleString();
        document.getElementById("depositAmount").value = "";
      } else {
        showMsg("depositMsg", data.error || "Failed.");
      }
    }

    // ─── Withdraw ───
    async function withdraw() {
      const amount = Number(document.getElementById("withdrawAmount").value);
      showMsg("withdrawMsg", "");
      if (!amount || amount < 1) { showMsg("withdrawMsg", "Enter a valid amount."); return; }

      const res  = await fetch(`${API}/api/user/withdraw`, {
        method:  "POST",
        headers: authHeaders(),
        body:    JSON.stringify({ amount }),
      });
      const data = await res.json();
      if (res.ok) {
        showMsg("withdrawMsg", `KES ${amount} withdrawn!`, true);
        document.getElementById("balanceAmount").textContent = data.newBalance.toLocaleString();
        document.getElementById("withdrawAmount").value = "";
      } else {
        showMsg("withdrawMsg", data.error || "Insufficient funds.");
      }
    }

    // ─── Change Email ───
    async function changeEmail() {
      const newEmail = document.getElementById("newEmail").value.trim();
      showMsg("emailMsg", "");
      if (!newEmail) { showMsg("emailMsg", "Enter a new email."); return; }

      const res  = await fetch(`${API}/api/user/update-email`, {
        method:  "PATCH",
        headers: authHeaders(),
        body:    JSON.stringify({ newEmail }),
      });
      const data = await res.json();
      if (res.ok) {
        showMsg("emailMsg", "Email updated!", true);
        document.getElementById("userEmail").textContent = newEmail;
        document.getElementById("newEmail").value = "";
      } else {
        showMsg("emailMsg", data.error || "Failed.");
      }
    }

    // ─── Change Password ───
    async function changePassword() {
      const newPassword = document.getElementById("newPassword").value;
      showMsg("passwordMsg", "");
      if (newPassword.length < 6) { showMsg("passwordMsg", "Min 6 characters."); return; }

      const res  = await fetch(`${API}/api/user/update-password`, {
        method:  "PATCH",
        headers: authHeaders(),
        body:    JSON.stringify({ newPassword }),
      });
      const data = await res.json();
      if (res.ok) {
        showMsg("passwordMsg", "Password updated!", true);
        document.getElementById("newPassword").value = "";
      } else {
        showMsg("passwordMsg", data.error || "Failed.");
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = "index.html";
    }

    loadProfile();
  </script>
</body>
</html>
